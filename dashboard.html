<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📊 Dashboard Supertrend Bot</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f4a 100%);
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            border-bottom: 2px solid #00d4ff;
            padding-bottom: 20px;
        }

        h1 {
            font-size: 2.5em;
            background: linear-gradient(45deg, #00d4ff, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: rgba(0, 212, 255, 0.1);
            border: 2px solid #00d4ff;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            transition: transform 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
        }

        .stat-value {
            font-size: 2.5em;
            font-weight: bold;
            color: #00ff88;
            margin: 10px 0;
        }

        .stat-label {
            font-size: 0.9em;
            color: #a0a0a0;
            text-transform: uppercase;
        }

        .signals-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .signal-section {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            overflow: hidden;
            border-left: 5px solid;
        }

        .signal-header {
            padding: 15px;
            font-weight: bold;
            font-size: 1.1em;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .long-section {
            border-left-color: #00ff88;
        }

        .long-section .signal-header {
            background: rgba(0, 255, 136, 0.1);
        }

        .short-section {
            border-left-color: #ff0055;
        }

        .short-section .signal-header {
            background: rgba(255, 0, 85, 0.1);
        }

        .neutral-section {
            border-left-color: #aaaaaa;
        }

        .neutral-section .signal-header {
            background: rgba(170, 170, 170, 0.1);
        }

        .signal-list {
            max-height: 500px;
            overflow-y: auto;
        }

        .signal-item {
            padding: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background 0.3s;
        }

        .signal-item:hover {
            background: rgba(0, 212, 255, 0.1);
        }

        .signal-name {
            font-weight: bold;
            font-size: 1.1em;
        }

        .signal-confidence {
            background: rgba(0, 255, 136, 0.2);
            padding: 5px 10px;
            border-radius: 5px;
            font-weight: bold;
            color: #00ff88;
        }

        .signal-details {
            font-size: 0.85em;
            color: #a0a0a0;
            margin-top: 5px;
        }

        .controls {
            background: rgba(0, 212, 255, 0.1);
            border: 2px solid #00d4ff;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        button {
            background: linear-gradient(45deg, #00d4ff, #00ff88);
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s;
        }

        button:hover {
            transform: scale(1.05);
        }

        .last-update {
            text-align: center;
            color: #a0a0a0;
            font-size: 0.9em;
            margin-top: 20px;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #a0a0a0;
        }

        .icon-long { color: #00ff88; }
        .icon-short { color: #ff0055; }
        .icon-neutral { color: #aaaaaa; }

        @media (max-width: 768px) {
            h1 { font-size: 1.8em; }
            .signals-container {
                grid-template-columns: 1fr;
            }
        }

        /* Scrollbar personalizado */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.2);
        }

        ::-webkit-scrollbar-thumb {
            background: #00d4ff;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #00ff88;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🤖 Dashboard Supertrend Bot</h1>
            <p>Análisis en tiempo real de todas las monedas</p>
        </header>

        <div class="controls">
            <button onclick="loadLatestData()">🔄 Recargar datos</button>
            <button onclick="autoRefresh()">⏱️ Auto-actualizar (cada 30s)</button>
            <button onclick="clearCache()">🗑️ Limpiar caché</button>
        </div>

        <div class="stats" id="stats">
            <div class="stat-card">
                <div class="stat-label">📈 Señales LONG</div>
                <div class="stat-value" id="long-count">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">📉 Señales SHORT</div>
                <div class="stat-value" id="short-count">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">⚪ Sin señal</div>
                <div class="stat-value" id="neutral-count">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">📊 Total analizado</div>
                <div class="stat-value" id="total-count">0</div>
            </div>
        </div>

        <div class="signals-container">
            <!-- LONG -->
            <div class="signal-section long-section">
                <div class="signal-header">
                    <span class="icon-long">📈</span>
                    <span>Señales de COMPRA</span>
                    <span id="long-badge" style="margin-left: auto; background: #00ff88; color: #000; padding: 2px 8px; border-radius: 3px;">0</span>
                </div>
                <div class="signal-list" id="long-signals">
                    <div class="empty-state">Sin señales LONG</div>
                </div>
            </div>

            <!-- SHORT -->
            <div class="signal-section short-section">
                <div class="signal-header">
                    <span class="icon-short">📉</span>
                    <span>Señales de VENTA</span>
                    <span id="short-badge" style="margin-left: auto; background: #ff0055; color: #fff; padding: 2px 8px; border-radius: 3px;">0</span>
                </div>
                <div class="signal-list" id="short-signals">
                    <div class="empty-state">Sin señales SHORT</div>
                </div>
            </div>

            <!-- NEUTRAL -->
            <div class="signal-section neutral-section">
                <div class="signal-header">
                    <span class="icon-neutral">⚪</span>
                    <span>Sin señal clara</span>
                    <span id="neutral-badge" style="margin-left: auto; background: #aaaaaa; color: #000; padding: 2px 8px; border-radius: 3px;">0</span>
                </div>
                <div class="signal-list" id="neutral-signals">
                    <div class="empty-state">Cargando...</div>
                </div>
            </div>
        </div>

        <div class="last-update" id="last-update">
            ⏰ Última actualización: -
        </div>
    </div>

    <script>
        function loadLatestData() {
            console.log('Cargando datos...');
            
            // Buscar archivo JSON más reciente
            fetch('signals_latest.json')
                .then(r => r.json())
                .then(data => renderData(data))
                .catch(e => {
                    console.log('signals_latest.json no encontrado, buscando en carpeta...');
                    // Fallback: cargar manualmente
                    loadFromDirectory();
                });
        }

        function renderData(data) {
            if (!data.signals) {
                console.error('Formato inválido');
                return;
            }

            const long = data.signals.long || [];
            const short = data.signals.short || [];
            const neutral = data.signals.neutral || [];

            // Actualizar contadores
            document.getElementById('long-count').textContent = long.length;
            document.getElementById('short-count').textContent = short.length;
            document.getElementById('neutral-count').textContent = neutral.length;
            document.getElementById('total-count').textContent = long.length + short.length + neutral.length;

            document.getElementById('long-badge').textContent = long.length;
            document.getElementById('short-badge').textContent = short.length;
            document.getElementById('neutral-badge').textContent = neutral.length;

            // Renderizar LONG
            if (long.length > 0) {
                document.getElementById('long-signals').innerHTML = long.map(s => `
                    <div class="signal-item">
                        <div>
                            <div class="signal-name">${s.symbol}</div>
                            <div class="signal-details">
                                RSI: ${s.rsi?.toFixed(1) || 'N/A'} | 
                                Precio: $${s.price?.toFixed(4) || 'N/A'}
                            </div>
                        </div>
                        <div class="signal-confidence">${s.confidence}%</div>
                    </div>
                `).join('');
            }

            // Renderizar SHORT
            if (short.length > 0) {
                document.getElementById('short-signals').innerHTML = short.map(s => `
                    <div class="signal-item">
                        <div>
                            <div class="signal-name">${s.symbol}</div>
                            <div class="signal-details">
                                RSI: ${s.rsi?.toFixed(1) || 'N/A'} | 
                                Precio: $${s.price?.toFixed(4) || 'N/A'}
                            </div>
                        </div>
                        <div class="signal-confidence">${s.confidence}%</div>
                    </div>
                `).join('');
            }

            // Mostrar primeros 10 neutral
            if (neutral.length > 0) {
                document.getElementById('neutral-signals').innerHTML = neutral.slice(0, 10).map(s => `
                    <div class="signal-item">
                        <div>
                            <div class="signal-name">${s.symbol}</div>
                            <div class="signal-details">RSI: ${s.rsi?.toFixed(1) || 'N/A'}</div>
                        </div>
                        <div class="signal-confidence">${s.confidence}%</div>
                    </div>
                `).join('');
            }

            // Actualizar timestamp
            const timestamp = data.timestamp || new Date().toLocaleString('es-ES');
            document.getElementById('last-update').textContent = `⏰ Última actualización: ${timestamp}`;
        }

        function autoRefresh() {
            setInterval(loadLatestData, 30000);
            alert('Auto-actualización activada cada 30 segundos');
        }

        function clearCache() {
            localStorage.clear();
            alert('Caché limpiado');
            location.reload();
        }

        // Cargar datos al abrir
        window.addEventListener('load', () => {
            loadLatestData();
        });

        // Recargar cada 30 segundos automáticamente
        setInterval(loadLatestData, 30000);
    </script>
</body>
</html>
